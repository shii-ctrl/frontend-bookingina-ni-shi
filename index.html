<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Computer Shop Booking</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page-shell">
      <header class="hero">
        <h1>Computer Shop Booking</h1>
        <p>Fast, secure booking for PC stations with smart schedule validation.</p>
      </header>

      <section id="container" class="layout gap-3">
        <article class="card form-card">
          <h2>Book a PC Session</h2>
          <form id="bookingForm" class="booking-form">
          <label>Name</label>
          <input type="text" id="customer_name" required />

          <label>PC Number</label>
          <input type="number" id="pc_number" required />

          <label>Date</label>
          <input type="date" id="booking_date" required />

          <label>Start Time</label>
          <input type="time" id="start_time" required />

          <label>End Time</label>
          <input type="time" id="end_time" required />

          <label>Contact</label>
          <input type="text" id="contact_number" required />

          <button type="submit">Add Booking</button>
          <button type="button" id="cancelBtn" style="display: none;">Cancel</button>
        </form>
      </article>

      <aside class="card list-card">
        <h2>Current Bookings</h2>
        <ul id="content" class="booking-list"></ul>
      </aside>
      </section>

      <footer class="footer">
        <p>© 2026 Computer Shop. Built for a smooth booking experience.</p>
      </footer>
    </main>

    <script src="index.js"></script>
  </body>
</html>
